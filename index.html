<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JUNTracker - Ultimate release tracker for Movies, Series, Anime, Games, Manga, Manhwa, Manhua, K-Drama, C-Drama & Books">
    <meta name="theme-color" content="#0A0C10">
    <title>JUNTracker | 10+ Release Categories (Fixed)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0A0C10;
            --bg-secondary: #12161F;
            --bg-card: rgba(18, 22, 32, 0.95);
            --border-glow: rgba(0, 255, 255, 0.2);
            --text-primary: #FFFFFF;
            --text-secondary: #A0AABF;
            --text-muted: #6B7280;
            --accent-cyan: #00FFFF;
            --accent-magenta: #FF00FF;
            --accent-gold: #FFD700;
            --accent-pink: #FF69B4;
            --shadow-glow: 0 0 20px rgba(0, 255, 255, 0.15);
            --gradient-1: linear-gradient(135deg, #00FFFF, #FF00FF);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
            animation: float 20s infinite ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--accent-cyan); top: -200px; left: -200px; }
        .orb-2 { width: 600px; height: 600px; background: var(--accent-magenta); bottom: -300px; right: -200px; }
        .orb-3 { width: 400px; height: 400px; background: var(--accent-pink); top: 40%; left: 50%; opacity: 0.15; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 40px;
            position: relative;
            z-index: 2;
        }

        .navbar {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glow);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            background: rgba(10, 12, 16, 0.85);
            z-index: 100;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Space Grotesk', monospace;
        }

        .logo span { color: white; background: none; }

        .nav-stats { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .stat-pill {
            background: rgba(0, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .search-section { margin: 32px 0 24px; }
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(18, 22, 32, 0.8);
            border: 1px solid var(--border-glow);
            border-radius: 60px;
            padding: 8px 20px;
            max-width: 400px;

        .search-box:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
        .search-box i { color: var(--text-muted); margin-right: 12px; }
        .search-box input {
            background: none;
            border: none;
            color: white;
            width: 100%;
            outline: none;
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 32px;
            overflow-x: auto;
            padding-bottom: 8px;

        .tab-btn {

            background: rgba(20, 25, 35, 0.8);
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;

            font-size: 13px;
            white-space: nowrap;

        .tab-btn i { margin-right: 6px; font-size: 12px; }
        .tab-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            transform: translateY(-2px);

        .tab-btn.active {

            color: var(--accent-cyan);

        .stats-bar {

            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .stat-card { display: flex; align-items: center; gap: 12px; }
        .stat-icon {
            width: 40px;
            height: 40px;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--accent-cyan);
        }
        .stat-info h4 { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .stat-info p { font-size: 18px; font-weight: 700; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin: 32px 0 60px;
        }

        .release-card {
            position: relative;
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s;
            border: 1px solid rgba(0, 255, 255, 0.1);
        }
        .release-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            transform: scaleX(0);
            transition: transform 0.4s;
        }
        .release-card:hover::before { transform: scaleX(1); }
        .release-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 255, 255, 0.3);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);

        .card-badge {

            top: 12px;

        .card-title {

            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;

        .card-desc {

            .stats-bar { flex-direction: column; }

</head>

<script>

    const API_KEYS = {

    };

    // ========== HELPER ==========
    function formatDate(dateStr) {
        if (!dateStr || dateStr === "TBA") return "TBA";
        if (!isNaN(dateStr) && dateStr.length === 4) return dateStr;
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        } catch(e) { return dateStr; }
    }

    function calculateDaysLeft(dateStr) {
        if (!dateStr || dateStr === "TBA" || dateStr.length === 4) return null;
        try {
            const release = new Date(dateStr);
            const today = new Date();
            const diff = Math.ceil((release - today) / (1000 * 60 * 60 * 24));
            if (diff < 0) return null;
            if (diff === 0) return "Today!";
            if (diff === 1) return "Tomorrow!";
            return `${diff}d`;
        } catch(e) { return null; }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    // ========== FETCH FUNCTIONS ==========
    async function fetchMovies() {
        const url = `https://api.themoviedb.org/3/movie/upcoming?api_key=${API_KEYS.tmdb}&language=en-US&page=1`;
        const res = await fetch(url);
        const data = await res.json();
        return data.results.slice(0, 15).map(m => ({
            id: m.id, title: m.title, releaseDate: m.release_date,
            description: m.overview?.substring(0, 150) || "No description",
            image: m.poster_path ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : null,
            type: "Movie", rating: m.vote_average?.toFixed(1) || "N/A", source: "TMDB"
        }));
    }

    async function fetchSeries() {
        const url = `https://api.themoviedb.org/3/tv/on_the_air?api_key=${API_KEYS.tmdb}&language=en-US&page=1`;
        const res = await fetch(url);
        const data = await res.json();
        return data.results.slice(0, 15).map(s => ({
            id: s.id, title: s.name, releaseDate: s.first_air_date || "TBA",
            description: s.overview?.substring(0, 150) || "No description",
            image: s.poster_path ? `https://image.tmdb.org/t/p/w500${s.poster_path}` : null,
            type: "Series", rating: s.vote_average?.toFixed(1) || "N/A", source: "TMDB"
        }));
    }

    async function fetchAnime() {
        const query = `{"query":"query { Page(page:1 perPage:15) { media(type:ANIME sort:POPULARITY_DESC status:NOT_YET_RELEASED) { id title { romaji } startDate { year month day } description coverImage { large } averageScore format } } }"}`;
        try {
            const res = await fetch('https://graphql.anilist.co', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: '{"query":"query { Page(page:1 perPage:15) { media(type:ANIME sort:POPULARITY_DESC status:NOT_YET_RELEASED) { id title { romaji } startDate { year month day } description coverImage { large } averageScore format } } }"}'
            });
            const data = await res.json();
            if (data.errors) throw new Error(data.errors[0].message);
            return data.data.Page.media.map(a => {
                let date = "TBA";
                if(a.startDate.year) date = `${a.startDate.year}-${String(a.startDate.month||1).padStart(2,'0')}-${String(a.startDate.day||1).padStart(2,'0')}`;
                return {
                    id: a.id, title: a.title.romaji, releaseDate: date,
                    description: a.description?.replace(/<[^>]*>/g,'').substring(0,150) || "Upcoming anime",
                    image: a.coverImage?.large, type: `Anime • ${a.format||"TV"}`,
                    rating: a.averageScore ? (a.averageScore/10).toFixed(1) : "N/A", source: "AniList"
                };
            });
        } catch(e) { console.error("Anime error:", e); return []; }
    }

    async function fetchGames() {

            image: g.background_image, type: "Game", rating: g.rating?.toFixed(1) || "N/A", source: "RAWG"

    }

            { id: 1, title: "The Longest Promise 2", releaseDate: "2026-07-20", description: "Xianxia fantasy sequel with epic romance", image: null, type: "C-Drama", rating: "8.4", source: "MyDramaList" },
            { id: 2, title: "Lost You Forever Season 3", releaseDate: "2026-08-10", description: "Final season of the epic fantasy romance", image: null, type: "C-Drama", rating: "8.9", source: "MyDramaList" },
            { id: 3, title: "The Legend of Shen Li 2", releaseDate: "2026-09-05", description: "Continuation of the hit xianxia drama", image: null, type: "C-Drama", rating: "8.6", source: "MyDramaList" },
            { id: 4, title: "Fox Spirit Matchmaker: Under the Moon", releaseDate: "2026-06-18", description: "Fantasy romance based on manhua", image: null, type: "C-Drama", rating: "8.1", source: "MyDramaList" },
            { id: 5, title: "The Prisoner of Beauty", releaseDate: "2026-07-01", description: "Historical romance with Liu Yuning", image: null, type: "C-Drama", rating: "8.2", source: "MyDramaList" }
        ];
    }

    async function fetchBooks() {
        const url = `https://openlibrary.org/search.json?q=fiction&sort=new&limit=15`;
        const res = await fetch(url);
        const data = await res.json();
        return data.docs.map(b => ({
            id: b.key, title: b.title, releaseDate: b.first_publish_year ? `${b.first_publish_year}` : "TBA",
            description: b.author_name ? `By ${b.author_name.slice(0,2).join(', ')}` : "Upcoming book",
            image: b.cover_i ? `https://covers.openlibrary.org/b/id/${b.cover_i}-L.jpg` : null,
            type: "Book", rating: "N/A", source: "OpenLibrary"
        }));
    }

    // ========== RENDER ==========
    function renderCards(items) {
        if (!items.length) {
            document.getElementById("contentArea").innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><h3>No results found</h3><p>Try another category</p></div>`;
            return;
        }
        const html = items.map(item => {
            const days = calculateDaysLeft(item.releaseDate);
            return `<div class="release-card">
                <div class="card-badge"><i class="fas fa-calendar"></i> Upcoming</div>
                <div class="card-image" style="background-image: url('${item.image || 'https://placehold.co/600x400/0A0C10/00FFFF?text=No+Cover'}'); background-size: cover; background-position: center;"></div>
                <div class="card-content">
                    <h3 class="card-title">${escapeHtml(item.title)}</h3>
                    <div class="release-date"><i class="far fa-calendar"></i> ${formatDate(item.releaseDate)}${days ? `<span class="countdown">• ${days}</span>` : ''}</div>
                    <p class="card-desc">${escapeHtml(item.description.substring(0,100))}...</p>
                    <div class="card-meta">
                        <span class="rating"><i class="fas fa-star"></i> ${item.rating}/10</span>
                        <span><i class="fas fa-cloud"></i> ${item.source}</span>
                    </div>
                </div>
            </div>`;
        }).join('');
        document.getElementById("contentArea").innerHTML = `<div class="cards-grid">${html}</div>`;
        document.getElementById("totalCount").innerHTML = items.length;
        const validRatings = items.filter(i => i.rating !== "N/A" && !isNaN(parseFloat(i.rating)));
        const avg = validRatings.length ? (validRatings.reduce((a,b)=>a+parseFloat(b.rating),0)/validRatings.length).toFixed(1) : "N/A";
        document.getElementById("avgRating").innerHTML = avg !== "N/A" ? `${avg}/10` : "N/A";
    }

    async function loadCategory(cat) {
        document.getElementById("contentArea").innerHTML = `<div class="loading-state"><div class="neon-spinner"></div><p>Loading ${cat.toUpperCase()}...</p></div>`;
        let items = [];
        try {
            switch(cat) {
                case "movie": items = await fetchMovies(); break;
                case "series": items = await fetchSeries(); break;
                case "anime": items = await fetchAnime(); break;
                case "game": items = await fetchGames(); break;
                case "manga": items = await fetchManga(); break;
                case "manhwa": items = await fetchManhwa(); break;
                case "manhua": items = await fetchManhua(); break;
                case "kdrama": items = await fetchKDrama(); break;
                case "cdrama": items = await fetchCDrama(); break;
                case "books": items = await fetchBooks(); break;
                default: items = [];
            }
            currentData = items;
            document.getElementById("dataSource").innerHTML = items[0]?.source || "API";
            document.getElementById("lastSync").innerHTML = new Date().toLocaleTimeString();
            const filtered = searchQuery ? items.filter(i => i.title.toLowerCase().includes(searchQuery.toLowerCase())) : items;
            renderCards(filtered);
        } catch(err) {
            console.error("Load error:", err);
            document.getElementById("contentArea").innerHTML = `<div class="error-state"><p>Error loading ${cat}. Please try again.</p></div>`;
        }
    }

    function handleSearch() {
        const filtered = currentData.filter(i => i.title.toLowerCase().includes(searchQuery.toLowerCase()));
        renderCards(filtered);
    }

    // ========== EVENTS ==========
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.dataset.cat;
            searchQuery = '';
            document.getElementById("searchInput").value = '';
            loadCategory(currentCategory);
        });
    });

    document.getElementById("searchInput").addEventListener("input", (e) => {
        searchQuery = e.target.value;
        handleSearch();
    });

    document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            document.getElementById("searchInput").focus();
        }
    });

    loadCategory("movie");
</script>
</body>
</html>
