<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUNTracker | Ultimate Release Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0C10;
            color: #EFF3F8;
            line-height: 1.5;
        }
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 500px; height: 500px; background: #00FFFF; top: -200px; left: -200px; }
        .orb-2 { width: 600px; height: 600px; background: #FF00FF; bottom: -300px; right: -200px; }
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 40px;
            position: relative;
            z-index: 2;
        }
        .navbar {
            padding: 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            background: rgba(10, 12, 16, 0.85);
            z-index: 100;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00FFFF, #FF00FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Space Grotesk', monospace;
        }
        .badge-api {
            background: rgba(0,255,255,0.1);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            border: 1px solid rgba(0,255,255,0.3);
        }
        .category-tabs {
            display: flex;
            gap: 16px;
            margin: 48px 0 32px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 28px;
            background: rgba(20, 25, 35, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 60px;
            color: #C0C8DD;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn i { margin-right: 8px; }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.2));
            border-color: #00FFFF;
            color: #00FFFF;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }
        .stats-bar {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stats-bar > div {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            margin: 32px 0 60px;
        }
        .release-card {
            background: linear-gradient(135deg, rgba(18, 22, 32, 0.95), rgba(12, 14, 20, 0.98));
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 255, 0.15);
            overflow: hidden;
            transition: all 0.4s;
        }
        .release-card:hover {
            transform: translateY(-8px);
            border-color: #00FFFF;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), 0 0 25px rgba(0,255,255,0.2);
        }
        .card-image {
            height: 210px;
            background-size: cover;
            background-position: center;
        }
        .card-content { padding: 24px; }
        .card-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; font-family: 'Space Grotesk', monospace; }
        .release-date {
            display: inline-block;
            background: rgba(0, 255, 255, 0.12);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #00FFFF;
            margin-bottom: 16px;
        }
        .card-desc { color: #A0AABF; font-size: 14px; margin-bottom: 20px; }
        .card-meta {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 16px;
            font-size: 13px;
            color: #7F8A9E;
        }
        .loading-state, .error-state { text-align: center; padding: 60px; background: rgba(20,25,35,0.5); border-radius: 24px; }
        .neon-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,255,255,0.2);
            border-top: 3px solid #00FFFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { border-top: 1px solid rgba(0,255,255,0.1); padding: 40px 0; text-align: center; color: #5A6579; margin-top: 40px; }
        .sync-btn {
            background: linear-gradient(135deg, #00FFFF, #FF00FF);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: #0A0C10;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .cards-grid { grid-template-columns: 1fr; }
            .tab-btn { padding: 8px 18px; font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="container">
    <nav class="navbar">
        <div class="logo">JUN<span style="color:white">Tracker</span></div>
        <div class="badge-api">
            <i class="fas fa-database"></i> Live APIs
        </div>
    </nav>

    <div class="category-tabs" id="categoryTabs">
        <button class="tab-btn active" data-cat="movie"><i class="fas fa-film"></i> Movies</button>
        <button class="tab-btn" data-cat="series"><i class="fas fa-tv"></i> Series</button>
        <button class="tab-btn" data-cat="game"><i class="fas fa-gamepad"></i> Games</button>
        <button class="tab-btn" data-cat="komik"><i class="fas fa-book-open"></i> Komik</button>
        <button class="tab-btn" data-cat="books"><i class="fas fa-book"></i> Books</button>
    </div>

    <div class="stats-bar" id="statsBar">
        <div><i class="fas fa-calendar"></i> <span id="totalCount">--</span> Upcoming</div>
        <div><i class="fas fa-cloud-upload-alt"></i> Source: <span id="dataSource">Live API</span></div>
        <div><i class="fas fa-sync-alt"></i> <span id="lastSync">Just now</span></div>
    </div>

    <div id="contentArea">
        <div class="loading-state"><div class="neon-spinner"></div><p>Fetching upcoming releases from APIs...</p></div>
    </div>

    <footer class="footer">
        <p>JUNTracker — Powered by TMDB · RAWG · AniList · OpenLibrary</p>
        <p style="font-size: 12px; margin-top: 12px;">🚀 Deployed on Vercel | Real-time API Data</p>
    </footer>
</div>

<script>
    // API Keys
    const API_KEYS = {
        tmdb: 'a2c120d7d3aaaf1321ffe8a9899ef765',
        rawg: 'acb03a4a2dd04337b6b62eb78e325c59'
    };
    
    let currentCategory = 'movie';

    // Fetch Movies from TMDB
    async function fetchMovies() {
        const url = `https://api.themoviedb.org/3/movie/upcoming?api_key=${API_KEYS.tmdb}&language=en-US&page=1`;
        const response = await fetch(url);
        const data = await response.json();
        return data.results.slice(0, 12).map(movie => ({
            title: movie.title,
            releaseDate: movie.release_date,
            description: movie.overview || "No description available.",
            image: movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : null,
            type: "Movie",
            rating: movie.vote_average?.toFixed(1) || "N/A",
            source: "TMDB"
        }));
    }

    // Fetch Series from TMDB
    async function fetchSeries() {
        const url = `https://api.themoviedb.org/3/tv/on_the_air?api_key=${API_KEYS.tmdb}&language=en-US&page=1`;
        const response = await fetch(url);
        const data = await response.json();
        return data.results.slice(0, 12).map(series => ({
            title: series.name,
            releaseDate: series.first_air_date || "TBA",
            description: series.overview || "Coming soon.",
            image: series.poster_path ? `https://image.tmdb.org/t/p/w500${series.poster_path}` : null,
            type: "Series",
            rating: series.vote_average?.toFixed(1) || "N/A",
            source: "TMDB"
        }));
    }

    // Fetch Games from RAWG
    async function fetchGames() {
        const url = `https://api.rawg.io/api/games?key=${API_KEYS.rawg}&dates=2025-01-01,2027-12-31&ordering=released&page_size=12`;
        const response = await fetch(url);
        const data = await response.json();
        return data.results.map(game => ({
            title: game.name,
            releaseDate: game.released || "TBA",
            description: game.description_raw || "Upcoming game release.",
            image: game.background_image,
            type: "Game",
            rating: game.rating?.toFixed(1) || "N/A",
            source: "RAWG"
        }));
    }

    // Fetch Komik from AniList
    async function fetchKomik() {
        const query = `{
            Page(page: 1, perPage: 12) {
                media(type: MANGA, sort: POPULARITY_DESC, status: NOT_YET_RELEASED) {
                    title { romaji english }
                    startDate { year month day }
                    description
                    coverImage { large }
                    averageScore
                }
            }
        }`;
        const response = await fetch('https://graphql.anilist.co', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query })
        });
        const { data } = await response.json();
        return data.Page.media.map(manga => {
            let dateStr = "TBA";
            if(manga.startDate.year) {
                dateStr = `${manga.startDate.year}-${String(manga.startDate.month || 1).padStart(2,'0')}-${String(manga.startDate.day || 1).padStart(2,'0')}`;
            }
            return {
                title: manga.title.romaji || manga.title.english || "Upcoming Manga",
                releaseDate: dateStr,
                description: manga.description?.replace(/<[^>]*>/g, '').substring(0, 150) || "Komik terbaru.",
                image: manga.coverImage?.large,
                type: "Komik",
                rating: manga.averageScore ? (manga.averageScore/10).toFixed(1) : "N/A",
                source: "AniList"
            };
        });
    }

    // Fetch Books from OpenLibrary
    async function fetchBooks() {
        const url = `https://openlibrary.org/search.json?q=fiction&sort=new&limit=12`;
        const response = await fetch(url);
        const data = await response.json();
        return data.docs.map(book => ({
            title: book.title,
            releaseDate: book.first_publish_year ? `${book.first_publish_year}` : "TBA",
            description: book.author_name ? `By ${book.author_name.slice(0,2).join(', ')}` : "Upcoming book.",
            image: book.cover_i ? `https://covers.openlibrary.org/b/id/${book.cover_i}-L.jpg` : null,
            type: "Book",
            rating: "N/A",
            source: "OpenLibrary"
        }));
    }

    async function loadCategory(category) {
        const contentDiv = document.getElementById("contentArea");
        contentDiv.innerHTML = `<div class="loading-state"><div class="neon-spinner"></div><p>Fetching from ${category.toUpperCase()} API...</p></div>`;
        
        let items = [];
        try {
            switch(category) {
                case "movie": items = await fetchMovies(); break;
                case "series": items = await fetchSeries(); break;
                case "game": items = await fetchGames(); break;
                case "komik": items = await fetchKomik(); break;
                case "books": items = await fetchBooks(); break;
            }
        } catch(err) {
            contentDiv.innerHTML = `<div class="error-state"><i class="fas fa-exclamation-triangle"></i><p>API Error: ${err.message}</p></div>`;
            return;
        }

        document.getElementById("totalCount").innerText = items.length;
        document.getElementById("dataSource").innerHTML = items[0]?.source || "API";
        document.getElementById("lastSync").innerHTML = new Date().toLocaleTimeString();

        if(!items.length) {
            contentDiv.innerHTML = `<div class="error-state"><p>No upcoming releases found for ${category}.</p></div>`;
            return;
        }

        const cardsHtml = items.map(item => `
            <div class="release-card">
                <div class="card-image" style="background-image: linear-gradient(0deg, rgba(5,7,10,0.9), rgba(0,0,0,0.4)), url('${item.image || 'https://placehold.co/600x400/0A0C10/00FFFF?text=No+Cover'}'); background-size: cover;">
                </div>
                <div class="card-content">
                    <h3 class="card-title">${escapeHtml(item.title)}</h3>
                    <span class="release-date"><i class="far fa-clock"></i> ${formatDate(item.releaseDate)}</span>
                    <p class="card-desc">${escapeHtml(item.description.substring(0, 120))}...</p>
                    <div class="card-meta">
                        <span><i class="fas fa-tag"></i> ${item.type}</span>
                        <span><i class="fas fa-star" style="color: #FFD966;"></i> ${item.rating}/10</span>
                        <span><i class="fas fa-cloud-upload-alt"></i> ${item.source}</span>
                    </div>
                </div>
            </div>
        `).join('');
        contentDiv.innerHTML = `<div class="cards-grid">${cardsHtml}</div>`;
    }

    function formatDate(dateStr) {
        if(!dateStr || dateStr === "TBA") return "TBA";
        try {
            const d = new Date(dateStr);
            if(isNaN(d.getTime())) return dateStr;
            return d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
        } catch(e) { return dateStr; }
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;';
            if(m==='<') return '&lt;';
            if(m==='>') return '&gt;';
            return m;
        });
    }

    // Tab navigation
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.dataset.cat;
            loadCategory(currentCategory);
        });
    });

    // Initial load
    loadCategory("movie");
</script>
</body>
</html>
