<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUNTracker | Ultimate Release Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0C10;
            color: #EFF3F8;
            line-height: 1.5;
        }
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 500px; height: 500px; background: #00FFFF; top: -200px; left: -200px; }
        .orb-2 { width: 600px; height: 600px; background: #FF00FF; bottom: -300px; right: -200px; }
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 40px;
            position: relative;
            z-index: 2;
        }
        .navbar {
            padding: 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            background: rgba(10, 12, 16, 0.85);
            z-index: 100;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00FFFF, #FF00FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Space Grotesk', monospace;
        }
        .badge-api {
            background: rgba(0,255,255,0.1);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            border: 1px solid rgba(0,255,255,0.3);
        }
        .category-tabs {
            display: flex;
            gap: 16px;
            margin: 48px 0 32px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 28px;
            background: rgba(20, 25, 35, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 60px;
            color: #C0C8DD;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn i { margin-right: 8px; }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.2));
            border-color: #00FFFF;
            color: #00FFFF;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }
        .stats-bar {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stats-bar > div {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            margin: 32px 0 60px;
        }
        .release-card {
            background: linear-gradient(135deg, rgba(18, 22, 32, 0.95), rgba(12, 14, 20, 0.98));
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 255, 0.15);
            overflow: hidden;
            transition: all 0.4s;
        }
        .release-card:hover {
            transform: translateY(-8px);
            border-color: #00FFFF;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), 0 0 25px rgba(0,255,255,0.2);
        }
        .card-image {
            height: 210px;
            background-size: cover;
            background-position: center;
        }
        .card-content { padding: 24px; }
        .card-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; font-family: 'Space Grotesk', monospace; }
        .release-date {
            display: inline-block;
            background: rgba(0, 255, 255, 0.12);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #00FFFF;
            margin-bottom: 16px;
        }
        .card-desc { color: #A0AABF; font-size: 14px; margin-bottom: 20px; }
        .card-meta {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 16px;
            font-size: 13px;
            color: #7F8A9E;
        }
        .loading-state, .error-state { text-align: center; padding: 60px; background: rgba(20,25,35,0.5); border-radius: 24px; }
        .neon-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,255,255,0.2);
            border-top: 3px solid #00FFFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { border-top: 1px solid rgba(0,255,255,0.1); padding: 40px 0; text-align: center; color: #5A6579; margin-top: 40px; }
        .sync-btn {
            background: linear-gradient(135deg, #00FFFF, #FF00FF);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: #0A0C10;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .cards-grid { grid-template-columns: 1fr; }
            .tab-btn { padding: 8px 18px; font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="container">
    <nav class="navbar">
        <div class="logo">JUN<span style="color:white">Tracker</span></div>
        <div class="badge-api">
            <i class="fas fa-database"></i> Neon DB | Vercel
        </div>
    </nav>

    <div class="category-tabs" id="categoryTabs">
        <button class="tab-btn active" data-cat="movie"><i class="fas fa-film"></i> Movies</button>
        <button class="tab-btn" data-cat="series"><i class="fas fa-tv"></i> Series</button>
        <button class="tab-btn" data-cat="game"><i class="fas fa-gamepad"></i> Games</button>
        <button class="tab-btn" data-cat="komik"><i class="fas fa-book-open"></i> Komik</button>
        <button class="tab-btn" data-cat="books"><i class="fas fa-book"></i> Books</button>
    </div>

    <div class="stats-bar" id="statsBar">
        <div><i class="fas fa-calendar"></i> <span id="totalCount">--</span> Upcoming</div>
        <div><i class="fas fa-database"></i> Source: <span id="dataSource">Neon DB</span></div>
        <div><i class="fas fa-sync-alt"></i> <span id="lastSync">--</span></div>
        <div><button class="sync-btn" onclick="manualSync()"><i class="fas fa-cloud-upload-alt"></i> Sync Now</button></div>
    </div>

    <div id="contentArea">
        <div class="loading-state"><div class="neon-spinner"></div><p>Loading from Neon Database...</p></div>
    </div>

    <footer class="footer">
        <p>JUNTracker — Powered by Neon PostgreSQL | TMDB · RAWG · AniList · OpenLibrary</p>
        <p style="font-size: 12px; margin-top: 12px;">🚀 Deployed on Vercel | Database: ap-southeast-1</p>
    </footer>
</div>

<script>
    // API endpoint (akan di-handle oleh Vercel Serverless Functions)
    const API_BASE = '/api';
    let currentCategory = 'movie';

    async function loadCategory(category) {
        const contentDiv = document.getElementById("contentArea");
        contentDiv.innerHTML = `<div class="loading-state"><div class="neon-spinner"></div><p>Fetching from Neon Database...</p></div>`;
        
        try {
            const response = await fetch(`${API_BASE}/releases?category=${category}`);
            const result = await response.json();
            
            if (result.success && result.data.length) {
                renderCards(result.data);
                document.getElementById("totalCount").innerText = result.data.length;
                document.getElementById("lastSync").innerText = new Date().toLocaleTimeString();
                document.getElementById("dataSource").innerHTML = `Neon DB (${result.count} items)`;
            } else {
                contentDiv.innerHTML = `<div class="error-state">
                    <i class="fas fa-database"></i>
                    <p>No data in database for ${category}</p>
                    <small>Click "Sync Now" to fetch from APIs</small>
                </div>`;
            }
        } catch (error) {
            console.error('Fetch error:', error);
            contentDiv.innerHTML = `<div class="error-state">
                <i class="fas fa-exclamation-triangle"></i>
                <p>Error connecting to server</p>
                <small>Make sure Vercel function is deployed correctly</small>
            </div>`;
        }
    }

    function renderCards(items) {
        const cardsHtml = items.map(item => `
            <div class="release-card">
                <div class="card-image" style="background-image: linear-gradient(0deg, rgba(5,7,10,0.9), rgba(0,0,0,0.4)), url('${item.image_url || 'https://placehold.co/600x400/0A0C10/00FFFF?text=No+Cover'}'); background-size: cover;">
                </div>
                <div class="card-content">
                    <h3 class="card-title">${escapeHtml(item.title)}</h3>
                    <span class="release-date"><i class="far fa-clock"></i> ${formatDate(item.release_date)}</span>
                    <p class="card-desc">${escapeHtml(item.description?.substring(0, 120) || 'No description')}...</p>
                    <div class="card-meta">
                        <span><i class="fas fa-tag"></i> ${item.category}</span>
                        <span><i class="fas fa-star" style="color: #FFD966;"></i> ${item.rating || 'N/A'}/10</span>
                        <span><i class="fas fa-cloud"></i> ${item.source_api}</span>
                    </div>
                </div>
            </div>
        `).join('');
        document.getElementById("contentArea").innerHTML = `<div class="cards-grid">${cardsHtml}</div>`;
    }

    async function manualSync() {
        const syncBtn = document.querySelector('.sync-btn');
        const originalText = syncBtn.innerHTML;
        syncBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Syncing...';
        syncBtn.disabled = true;
        
        try {
            const response = await fetch(`${API_BASE}/sync`, { method: 'POST' });
            const result = await response.json();
            
            if (result.success) {
                alert(`Sync completed!\n${result.results.map(r => `${r.category}: ${r.count} items`).join('\n')}`);
                loadCategory(currentCategory);
            } else {
                alert('Sync failed: ' + result.error);
            }
        } catch (error) {
            alert('Error: ' + error.message);
        } finally {
            syncBtn.innerHTML = originalText;
            syncBtn.disabled = false;
        }
    }

    function formatDate(dateStr) {
        if (!dateStr) return "TBA";
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        } catch(e) { return dateStr; }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Tab navigation
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.dataset.cat;
            loadCategory(currentCategory);
        });
    });

    // Initial load
    loadCategory("movie");
</script>
</body>
</html>
